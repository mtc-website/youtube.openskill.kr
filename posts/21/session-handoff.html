# 세션 핸드오프 — 메타코딩 「에이전트 개념서」

> **용도:** 새 세션을 열 때 이 문서를 *가장 먼저* 붙여넣어 컨텍스트(보따리)를 시드한다.
> 사람과 AI가 둘 다 읽을 수 있게 작성했다. (compaction/메모리와 달리 휴대·공유·감사 가능)
> 최종 갱신: 2026-05-22

---

## 동기화 방식 (single source)
- 편집은 사람이 보는 페이지(`세션_핸드오프.html`)에서 한다 — 브라우저·휴대폰에서 바로 수정 가능.
- 단, 고치는 것은 'HTML 태그'가 아니라 '내용(이 마크다운)'이다. 페이지가 마크다운을 편집·렌더하고, 버튼으로 `.md`를 내보낸다.
- 내보낸 `.md`가 AI에게 주는 원천이자 git 정본이다. (HTML을 손으로 고쳐 MD로 되돌리는 건 손실·취약하니 금지)
- 흐름: 페이지에서 내용 편집 → MD 내보내기 → AI에 붙여넣기 / git push로 팀 공유.

## 프로젝트 한 줄
유튜브 채널 **메타코딩**(판서형)의 **"AI 에이전트 개념서"** 강의 시리즈 기획·제작. **개념 전용**(원리만). 실제 구현/도구 데모는 「바이브 코딩」 **자매 시리즈**로 분리.

## 지금까지의 산출물 (outputs 폴더)
- `메타코딩_에이전트개념서_기획서.md` / `.html` — v3 완전판 기획서(5막 16편)
- `index.html` — 전체 목차(챕터 카드 → 각 수업 링크)
- `lesson_01.html` ~ `lesson_16.html` — 챕터별 상세 수업 페이지(이전/다음 네비 포함)
- `simulator_02.html` — 2강(토큰·임베딩) 인터랙티브 시뮬레이터
- `메타코딩_에이전트강의_기획서.md` — 게임척추 v2(이전 버전, 참고용)

## 확정된 결정 (decisions)
- 시리즈 성격: **개념 전용.** 도구 클릭/자동화 구축/디스코드 = 자매 시리즈.
- 구조: **5막 16편**, 1영상 = 1개념 = 1시뮬레이터, 10~13분.
- 영상 포맷: 훅 → 판서 → 시뮬레이터(★"개념 비유 — 실제 내부와 다름" 라벨 필수) → 오개념 부수기 → 요약/떡밥.
- **1·2강 스왑 완료:** 1강 = 무상태 & 보따리, 2강 = 토큰 & 임베딩. (이유: 응집성 — 보따리 그릇을 먼저 보여주고, 토큰은 그 단위로. 반전형 훅이 1강에 적합)
- 1강 깊이 **트림 완료**(확장성/재현성 디테일 축약, "통제권" thesis 강조).
- 게임 메타포를 시리즈 척추로. 스킬 = 아이템(공유·동적), 캐릭터 고유능력 = 시스템 프롬프트.

## 열린 결정 (새 세션에서 정할 것)
- **게임 확정: 스타크래프트 vs 포켓몬 (미정).** 확정 시 메타포 사전 + 12·13강 비유 갱신.
- 나머지 챕터 시뮬레이터(1, 3~16) 제작 여부.
- 16편 → 핵심 스파인 12편 타이트 버전으로 줄일지.

## ★ 반드시 지킬 사실 정정 (negative knowledge — 틀리기 쉬운 것)
- 토큰: "못 늘린다" ✗ → 늘리되 **수확 체감 + 알고리즘 필요**.
- context rot: "절벽" ✗ → **완만한 그래디언트**.
- 컨텍스트 정리: "GC" ✗ → **손실 요약/제거, 2층**(KV eviction + compaction).
- 할루시네이션: "검색 실패" ✗ → **그럴듯함 생성 + 추측 보상(OpenAI 2025) + 작화(confabulation)**.
- 캐시(KV/prompt): "품질 개선" ✗ → **비용·지연만**.
- 서브에이전트: "병렬이 1번 목적" ✗ → **컨텍스트 분리가 1번, 병렬은 보너스**.
- TDD: "절차 강요로 회귀 막힘" ✗ → **절차만은 역효과(TDAD), 핵심은 테스트=source of truth 컨텍스트 + 실패 피드백**.

## 톤·제약
- 판서형 채널. 시뮬레이터엔 "개념 비유" 라벨 의무.
- 사실 정확성 최우선(댓글 클레임 방어). 도구 데모는 "(YYYY-MM 기준)" 날짜 박제.
- 디자인: 보라(#6d5efc) 강조 + Pretendard, 카드/히어로 톤 통일.

## 새 세션 시작 프롬프트 (예시)
> "메타코딩 에이전트 개념서 시리즈를 이어서 작업할 거야. 아래 핸드오프를 컨텍스트로 삼아줘. 먼저 [게임 확정 / N강 시뮬레이터 제작 / 12편 타이트 버전] 부터 하자."
> (그리고 이 파일 전체를 붙여넣기)

<script>
const ORIGINAL=document.getElementById('src').textContent.replace(/^\n/,'');
const KEY='handoff_md_v1';
let md = load() || ORIGINAL;

function load(){ try{ return localStorage.getItem(KEY); }catch(e){ return null; } }
function save(v){ try{ localStorage.setItem(KEY,v); }catch(e){} }

/* --- 작은 마크다운 렌더러 (헤딩/볼드/코드/리스트/인용/HR) --- */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function inline(s){
  return esc(s)
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g,'<em>$1</em>');
}
function mdToHtml(src){
  const lines=src.replace(/\r/g,'').split('\n');
  let out='', inList=false;
  const closeList=()=>{ if(inList){ out+='</ul>'; inList=false; } };
  for(const raw of lines){
    const line=raw.replace(/\s+$/,'');
    if(!line.trim()){ closeList(); continue; }
    if(/^---+$/.test(line.trim())){ closeList(); out+='<hr>'; continue; }
    let m;
    if(m=line.match(/^(#{1,6})\s+(.*)$/)){ closeList(); const lv=m[1].length; out+=`<h${lv}>${inline(m[2])}</h${lv}>`; continue; }
    if(m=line.match(/^>\s?(.*)$/)){ closeList(); out+=`<blockquote>${inline(m[1])}</blockquote>`; continue; }
    if(m=line.match(/^[-*]\s+(.*)$/)){ if(!inList){ out+='<ul>'; inList=true; } out+=`<li>${inline(m[1])}</li>`; continue; }
    closeList(); out+=`<p>${inline(line)}</p>`;
  }
  closeList();
  return out;
}

const viewer=document.getElementById('viewer'), ta=document.getElementById('ta');
function renderView(){ viewer.innerHTML=mdToHtml(md); }
ta.value=md; renderView();

/* 보기 / 편집 토글 */
const viewBtn=document.getElementById('viewBtn'), editBtn=document.getElementById('editBtn'),
      editor=document.getElementById('editor');
function mode(edit){
  editor.classList.toggle('show',edit);
  viewer.style.display=edit?'none':'block';
  editBtn.classList.toggle('on',edit);
  viewBtn.classList.toggle('on',!edit);
}
viewBtn.onclick=()=>{ renderView(); mode(false); };
editBtn.onclick=()=>mode(true);

/* 편집 → 자동 저장 + 라이브 반영 */
ta.addEventListener('input',()=>{ md=ta.value; save(md); });

/* 내보내기 */
function toast(t){ const el=document.getElementById('toast'); el.textContent=t; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),1600); }
document.getElementById('dlBtn').onclick=()=>{
  const blob=new Blob([md],{type:'text/markdown;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='세션_핸드오프.md';
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(a.href);
  toast('세션_핸드오프.md 내려받음');
};
document.getElementById('copyBtn').onclick=async()=>{
  try{ await navigator.clipboard.writeText(md); toast('마크다운 복사됨 — AI에 붙여넣으세요'); }
  catch(e){ ta.style.display='block'; mode(true); ta.focus(); ta.select(); toast('편집창에서 전체 선택해 복사하세요'); }
};
document.getElementById('resetBtn').onclick=()=>{
  if(confirm('편집 내용을 버리고 원본으로 되돌릴까요?')){ md=ORIGINAL; ta.value=md; save(md); renderView(); toast('원본으로 복원'); }
};
</script>
</body></html>
